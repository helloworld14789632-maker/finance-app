<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction - Personal Finance Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Personal Finance Manager</h1>
            <nav>
                <a href="{{ url_for('main.index') }}">Dashboard</a>
                <a href="{{ url_for('transactions.add_transaction') }}" class="btn btn-primary" style="text-decoration: none; color: white;">+ Add Transaction</a>
            </nav>
        </header>

        <div class="form-container">
            <h2>Edit Transaction</h2>
            <form method="POST">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" value="{{ transaction.description }}" required>
                </div>

                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" name="amount" value="{{ transaction.amount }}" required step="0.01">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="Salary" {% if transaction.category == 'Salary' %}selected{% endif %}>Salary</option>
                        <option value="Freelance" {% if transaction.category == 'Freelance' %}selected{% endif %}>Freelance</option>
                        <option value="Investment" {% if transaction.category == 'Investment' %}selected{% endif %}>Investment</option>
                        <option value="Other Income" {% if transaction.category == 'Other Income' %}selected{% endif %}>Other Income</option>
                        <option value="---" {% if transaction.category == '---' %}selected{% endif %}>---</option>
                        <option value="Groceries" {% if transaction.category == 'Groceries' %}selected{% endif %}>Groceries</option>
                        <option value="Transportation" {% if transaction.category == 'Transportation' %}selected{% endif %}>Transportation</option>
                        <option value="Utilities" {% if transaction.category == 'Utilities' %}selected{% endif %}>Utilities</option>
                        <option value="Entertainment" {% if transaction.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                        <option value="Healthcare" {% if transaction.category == 'Healthcare' %}selected{% endif %}>Healthcare</option>
                        <option value="Dining" {% if transaction.category == 'Dining' %}selected{% endif %}>Dining</option>
                        <option value="Shopping" {% if transaction.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                        <option value="Other" {% if transaction.category == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" name="type" required>
                        <option value="income" {% if transaction.transaction_type == 'income' %}selected{% endif %}>Income</option>
                        <option value="expense" {% if transaction.transaction_type == 'expense' %}selected{% endif %}>Expense</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" value="{{ transaction.date.strftime('%Y-%m-%d') }}">
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Update Transaction</button>
                    <a href="{{ url_for('main.index') }}" class="btn" style="background-color: #999; color: white; text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
